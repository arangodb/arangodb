name: arangodb_vector_index_ingesting_duration_seconds
introducedIn: "3.12.9"
help: |
  Wall-clock seconds spent in the last ingesting phase of a vector index.
unit: seconds
type: gauge
category: VectorIndex
complexity: advanced
exposedBy:
  - dbserver
  - single
description: |
  Wall-clock duration in seconds of the most recent ingesting phase for
  a vector index. During ingesting, existing documents are backfilled
  into the newly trained FAISS index. The value is updated when the
  index transitions out of the "ingesting" state (state 2) into
  "ready" (state 3). It remains at its last recorded value until
  the index is retrained.
