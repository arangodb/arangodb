name: arangodb_async_existing_thread_registries
introducedIn: "3.12.4"
help: |
  Number of currently existing async thread registires
unit: number
type: gauge
category: Statistics
complexity: advanced
exposedBy:
  - dbserver
  - coordinator
description: |
  Number of currently existing async thread registries. One thread registry is created when the first async operation is created on a thread. The registry lives at least as long as long as the thread itself but also at least as long as the last async operation inside it - therefore it can exist longer than the thread itself.
