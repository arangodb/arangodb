name: arangodb_async_thread_registries_total
introducedIn: "3.12.4"
help: |
  Total number of threads that started asynchronous operations since database process start.
unit: number
type: counter
category: Statistics
complexity: advanced
exposedBy:
  - dbserver
  - coordinator
description: |
  Total number of threads that started asynchronous operations since database process start. It can be higher than the total number of threads if a thread was restarted at some point.
