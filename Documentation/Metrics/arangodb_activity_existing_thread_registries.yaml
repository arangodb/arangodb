name: arangodb_activity_existing_thread_registries
introducedIn: "3.12.8"
help: |
  Number of currently existing activity thread registries.
unit: number
type: gauge
category: Statistics
complexity: advanced
exposedBy:
  - dbserver
  - coordinator
  - agent
description: |
  Number of currently existing activity thread registries. One thread registry is created when the first activity is created on a thread. The registry lives at least as long as long as the thread itself but also at least as long as the last activity inside it - therefore it can exist longer than the thread itself.
